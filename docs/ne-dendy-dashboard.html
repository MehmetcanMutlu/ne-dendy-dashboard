      React.createElement("div",{style:{position:"relative",flex:1,minWidth:180}},
        React.createElement("span",{style:{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:C.muted,fontSize:12}},"🔍"),
        React.createElement("input",{type:"text",placeholder:"İçgörü ara...",value:q,onChange:e=>setQ(e.target.value),style:{width:"100%",background:C.bg,color:C.text,border:`1px solid ${q?C.accent:C.border}`,borderRadius:10,padding:"8px 12px 8px 32px",fontSize:13,fontFamily:"inherit",outline:"none"}})
      ),
      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:6,marginLeft:"auto"}},
        React.createElement("span",{style:{fontSize:12,color:C.muted,marginRight:4}},"Sırala:"),
        ...[["severity","Önem"],["score","Skor"],["confidence","Güven"]].map(([s,l])=>
          React.createElement("button",{key:s,onClick:()=>setSort(s),style:{padding:"6px 11px",borderRadius:8,border:`1px solid ${sort===s?C.accent:C.border}`,background:sort===s?C.accentSoft:"transparent",color:sort===s?C.accent:C.muted,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}},l)
        )
      )
    ),

    /* ── Tabs */
    React.createElement("div",{style:{display:"flex",padding:"0 28px",background:C.surface,borderBottom:`1px solid ${C.border}`}},
      TABS.map(t=>React.createElement("button",{
        key:t.id,onClick:()=>setTab(t.id),
        style:{padding:"13px 18px",border:"none",borderBottom:`2px solid ${tab===t.id?C.accent:"transparent"}`,background:"transparent",color:tab===t.id?C.accent:C.muted,fontFamily:"inherit",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:6,transition:"all .15s"}
      },t.icon," ",t.label)),
      React.createElement("div",{style:{marginLeft:"auto",display:"flex",alignItems:"center"}},
        React.createElement("span",{style:{fontSize:12,color:C.muted}},filtered.length.toLocaleString("tr-TR")+" sonuç")
      )
    ),

    /* ── Content */
    React.createElement("main",{style:{flex:1,padding:"26px 28px",maxWidth:1400,margin:"0 auto",width:"100%"}},
      tab==="overview"&&React.createElement(OverviewTab,{stats}),
      tab==="insights"&&React.createElement(InsightsTab,{data:display}),
      tab==="themes"&&React.createElement(ThemesTab,{stats,filteredData:filtered})
    ),

    /* ── Footer */
    React.createElement("footer",{style:{borderTop:`1px solid ${C.border}`,padding:"11px 28px",display:"flex",alignItems:"center",justifyContent:"space-between"}},
      React.createElement("span",{style:{fontSize:11,color:C.dim}},"Dendy · Ne Dendy? Modülü · v1.0"),
      React.createElement("span",{style:{fontSize:11,color:C.dim}},new Date().toLocaleDateString("tr-TR",{day:"numeric",month:"long",year:"numeric"}))
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
